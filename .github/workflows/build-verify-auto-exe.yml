name: Build Verify Auto EXE

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/verify-auto-257f
    paths:
      - "verify_auto/**"
      - "slider_solver/screen_match.py"
      - ".github/workflows/build-verify-auto-exe.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -U pip -r verify_auto/requirements-build.txt
      - name: Build EXE
        run: python -m PyInstaller verify_auto/verify_auto.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: 两步验证助手-windows
          path: dist/两步验证助手.exe
          if-no-files-found: error
      - name: Copy for release
        run: copy "dist\两步验证助手.exe" "dist\verify_auto.exe"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: verify-auto-v0.8.4
          name: 两步验证助手 v0.8.4
          body: |
            v0.8.4：不再乱点 + 大幅加速
            - 去掉失败后的强化模式/逐格试探
            - 第1步只点词库最佳1格
            - 第2步词库只点1次，追踪6帧
            - 建议填写关键词参数
          files: dist/verify_auto.exe
          make_latest: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
