name: Build Verify Auto EXE

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/verify-auto-257f
    paths:
      - "verify_auto/**"
      - "slider_solver/screen_match.py"
      - ".github/workflows/build-verify-auto-exe.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -U pip -r verify_auto/requirements-build.txt
      - name: Build EXE
        run: python -m PyInstaller verify_auto/verify_auto.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: 两步验证助手-windows
          path: dist/两步验证助手.exe
          if-no-files-found: error
      - name: Copy for release
        run: copy "dist\两步验证助手.exe" "dist\verify_auto.exe"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: verify-auto-v0.5.4
          name: 两步验证助手 v0.5.4
          body: |
            Windows 单文件 exe，解压/下载后直接运行。

            v0.5.4：修复收录 OCR 一直为空 — 学习模式优先全屏自动找验证窗，不再死用固定坐标。
            v0.5.3：收录改为提示字状态机；第1步点网格即收录；第2步识别「运动最慢」后立即点击。
            首次使用：弹出验证小窗 → 框选 4 个区域 → 收录几张图 → F8 全自动。
          files: dist/verify_auto.exe
          make_latest: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
