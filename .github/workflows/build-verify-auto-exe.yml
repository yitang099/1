name: Build Verify Auto EXE

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/verify-auto-257f
    paths:
      - "verify_auto/**"
      - "slider_solver/screen_match.py"
      - ".github/workflows/build-verify-auto-exe.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -U pip -r verify_auto/requirements-build.txt
      - name: Build EXE
        run: python -m PyInstaller verify_auto/verify_auto.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: 两步验证助手-windows
          path: dist/两步验证助手.exe
          if-no-files-found: error
      - name: Copy for release
        run: |
          copy "dist\两步验证助手.exe" "dist\verify_auto.exe"
          copy "dist\两步验证助手.exe" "dist\verify_auto_v0.8.6.exe"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: verify-auto-v0.8.6
          name: 两步验证助手 v0.8.6
          body: |
            v0.8.6：请下载 verify_auto_v0.8.6.exe（窗口标题应显示 v0.8.6）
            含 v0.8.5 识别框修复：每次F9重新找窗、只点一次
          files: |
            dist/verify_auto.exe
            dist/verify_auto_v0.8.6.exe
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
